<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Launcher">
<meta name="theme-color" content="#0a0a14">
<link rel="manifest" href="manifest.json">
<title>Launcher</title>
<style>
  :root {
    --bg-deep: #0a0a14;
    --bg: #15121f;
    --surface: rgba(50, 45, 75, 0.9);
    --card: rgba(55, 50, 85, 0.9);
    --border: rgba(220, 200, 255, 0.4);
    --border-bright: rgba(220, 200, 255, 0.75);
    --ink: #ffffff;
    --muted: #e8e0ff;
    --neon-violet: #e4ccff;
    --neon-cyan: #b8f8ff;
    --neon-pink: #ffaae8;
    --glow-violet: rgba(228, 204, 255, 0.8);
    --glow-cyan: rgba(184, 248, 255, 0.7);
    --danger: #ff7788;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overscroll-behavior: none;
    background: var(--bg-deep);
  }
  body {
    background: var(--bg-deep);
    color: var(--ink);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 500px 350px at 10% 0%, rgba(201, 168, 255, 0.08), transparent 60%),
      radial-gradient(ellipse 400px 400px at 90% 20%, rgba(142, 245, 255, 0.05), transparent 60%),
      radial-gradient(ellipse 350px 500px at 50% 100%, rgba(255, 125, 224, 0.04), transparent 60%),
      linear-gradient(rgba(180, 150, 255, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180, 150, 255, 0.025) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 100% 100%, 50px 50px, 50px 50px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 0%, var(--bg-deep) 90%);
    pointer-events: none;
    z-index: 1;
    opacity: 0.5;
  }
  #home {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: calc(env(safe-area-inset-top, 20px) + 12px) 0 calc(env(safe-area-inset-bottom, 0px) + 90px);
  }
  .top-bar { padding: 8px 24px 0; margin-bottom: 32px; }
  .brand {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 34px;
    color: #e4ccff;
    text-shadow: 0 0 20px rgba(228, 204, 255, 0.6);
    line-height: 1;
  }
  .brand-sub {
    font-size: 9px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: #d4cce8;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-sub::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-bright), transparent);
  }
  .app-count {
    color: #b8f8ff;
    text-shadow: 0 0 10px rgba(184, 248, 255, 0.8);
    font-weight: bold;
  }
  .version-tag {
    color: #ffaae8;
    text-shadow: 0 0 10px rgba(255, 170, 232, 0.8);
    padding: 3px 10px;
    border: 1px solid rgba(255, 170, 232, 0.7);
    background: rgba(255, 170, 232, 0.1);
    border-radius: 10px;
    font-size: 9px;
    font-weight: bold;
  }
  .grid {
    flex: 1;
    padding: 0 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    align-content: start;
  }
  .app-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 16px 14px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .app-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-violet), transparent);
    opacity: 0.4;
  }
  .app-card:active { transform: scale(0.96); }
  .app-card .icon {
    font-size: 32px;
    line-height: 1;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 12px var(--glow-violet));
  }
  .app-card .name {
    font-size: 14px;
    color: #ffffff;
    line-height: 1.3;
    font-weight: 600;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .app-card .meta {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #d4cce8;
    text-transform: uppercase;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .type-badge {
    background: rgba(228, 204, 255, 0.2);
    color: #e4ccff;
    padding: 1px 6px;
    border-radius: 6px;
    font-size: 8px;
    font-weight: bold;
    letter-spacing: 0.15em;
  }
  .type-badge.jsx {
    background: rgba(184, 248, 255, 0.2);
    color: #b8f8ff;
  }
  .app-card .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--danger);
    border: 2px solid var(--bg-deep);
    color: white;
    font-size: 14px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    line-height: 1;
  }
  body.edit-mode .delete-btn { display: flex; }
  body.edit-mode .app-card { animation: wiggle 0.4s ease infinite alternate; }
  .add-card {
    background: rgba(228, 204, 255, 0.08);
    border: 2px dashed rgba(228, 204, 255, 0.7);
    border-radius: 18px;
    padding: 20px 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 130px;
  }
  .add-card:active { transform: scale(0.96); }
  .add-card .plus {
    font-size: 42px;
    color: #ffffff;
    text-shadow: 0 0 20px rgba(228, 204, 255, 1);
    line-height: 1;
    font-weight: 300;
  }
  .add-card .add-label {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: #e4ccff;
    text-transform: uppercase;
    font-weight: bold;
  }
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    padding: 16px 24px calc(env(safe-area-inset-bottom, 0px) + 16px);
    background: linear-gradient(to top, var(--bg-deep) 50%, transparent);
    display: flex;
    justify-content: center;
    z-index: 10;
  }
  .edit-toggle {
    background: rgba(45, 40, 75, 0.9);
    border: 1px solid rgba(228, 204, 255, 0.6);
    color: #ffffff;
    padding: 12px 28px;
    border-radius: 24px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 0 12px rgba(228, 204, 255, 0.3);
  }
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
  }
  .empty-icon { font-size: 56px; margin-bottom: 20px; opacity: 0.5; }
  .empty p {
    font-size: 13px;
    line-height: 1.8;
    letter-spacing: 0.15em;
    color: #ffffff;
  }
  #add-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(5, 5, 13, 0.85);
    align-items: flex-end;
  }
  #add-modal.open { display: flex; }
  .modal-sheet {
    background: linear-gradient(180deg, rgba(30, 25, 60, 0.95) 0%, rgba(15, 12, 30, 0.98) 100%);
    border: 1px solid var(--border-bright);
    border-radius: 24px 24px 0 0;
    padding: 18px 22px calc(env(safe-area-inset-bottom, 0px) + 22px);
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .sheet-handle {
    width: 40px;
    height: 4px;
    background: var(--border-bright);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .sheet-title {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 24px;
    color: #e4ccff;
    margin-bottom: 4px;
  }
  .sheet-sub {
    font-size: 10px;
    color: #c8c0e8;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .detected-type {
    display: inline-block;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 9px;
    font-weight: bold;
    letter-spacing: 0.15em;
  }
  .detected-type.html { background: rgba(228, 204, 255, 0.2); color: #e4ccff; }
  .detected-type.jsx { background: rgba(184, 248, 255, 0.2); color: #b8f8ff; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #e8e0ff;
    margin-bottom: 8px;
    font-weight: bold;
  }
  .field input, .field textarea {
    width: 100%;
    background: rgba(10, 10, 24, 0.6);
    border: 1px solid var(--border);
    color: #ffffff;
    padding: 13px 15px;
    border-radius: 12px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    outline: none;
    -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--neon-violet); }
  .field textarea { height: 130px; resize: none; font-size: 11px; line-height: 1.5; }
  .emoji-picker {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
  }
  .emoji-opt {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(10, 10, 24, 0.4);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .emoji-opt.selected {
    border-color: var(--neon-violet);
    background: var(--glow-violet);
    transform: scale(1.08);
  }
  .sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(228, 204, 255, 0.5);
    color: #e4ccff;
    padding: 15px;
    border-radius: 14px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-save {
    flex: 2;
    background: linear-gradient(135deg, var(--neon-violet), var(--neon-pink));
    border: none;
    color: white;
    padding: 15px;
    border-radius: 14px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-weight: bold;
    cursor: pointer;
  }
  #viewer {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    background: #000;
  }
  #viewer.open { display: block; }
  #viewer iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  .viewer-close-fab {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
    right: 16px;
    z-index: 600;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(20, 20, 40, 0.9);
    border: 1px solid var(--neon-violet);
    color: var(--neon-violet);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 20px var(--glow-violet);
  }
  @keyframes wiggle {
    from { transform: rotate(-1deg); }
    to { transform: rotate(1deg); }
  }
</style>
</head>
<body>

<div id="home">
  <div class="top-bar">
    <div class="brand">Launcher</div>
    <div class="brand-sub">
      <span class="version-tag">v5.3</span>
      <span class="app-count" id="app-count">--</span>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="bottom-bar">
    <button class="edit-toggle" id="edit-toggle" onclick="toggleEdit()">Modifier</button>
  </div>
</div>

<div id="add-modal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Nouvelle app</div>
    <div class="sheet-sub">Colle ton code <span class="detected-type" id="type-indicator" style="display:none"></span></div>
    <div class="field">
      <label>Nom</label>
      <input type="text" id="inp-name" placeholder="Mon app" maxlength="30" autocomplete="off">
    </div>
    <div class="field">
      <label>Icône</label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>
    <div class="field">
      <label>Code (HTML ou JSX)</label>
      <textarea id="inp-code" placeholder="<!DOCTYPE html>... ou import React..."></textarea>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveApp()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="viewer">
  <iframe id="viewer-frame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  <button class="viewer-close-fab" onclick="closeViewer()">✕</button>
</div>

<script>
const STORAGE_KEY = 'flo_launcher_apps_v1';
const EMOJIS = ['🃏','🎮','📊','🎯','⏱','🎲','📝','🏓','🎵','🛠','🌿','⭐','🔥','💡','🎨','🚀'];

let apps = [];
let editMode = false;
let selectedEmoji = EMOJIS[0];

function load() {
  try { apps = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { apps = []; }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(apps)); } catch(e) { alert('Stockage plein.'); }
}

function detectType(code) {
  const lower = code.toLowerCase().trim();
  if (lower.startsWith('<!doctype') || /<html[\s>]/i.test(lower) || /<body[\s>]/i.test(lower)) {
    return 'html';
  }
  return 'jsx';
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('app-count').textContent = apps.length ? apps.length + ' app' + (apps.length > 1 ? 's' : '') : '';

  if (apps.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">📱</div><p>Aucune app pour l&apos;instant.<br>Ajoute ta première app<br>avec le bouton +</p></div>';
  } else {
    apps.forEach((app, i) => {
      const card = document.createElement('div');
      card.className = 'app-card';
      const type = app.type || 'html';
      const badge = type === 'jsx'
        ? '<span class="type-badge jsx">JSX</span>'
        : '<span class="type-badge">HTML</span>';
      card.innerHTML =
        '<button class="delete-btn" onclick="deleteApp(event,' + i + ')">×</button>' +
        '<div class="icon">' + app.icon + '</div>' +
        '<div><div class="name">' + escHtml(app.name) + '</div>' +
        '<div class="meta">' + badge + formatDate(app.date) + '</div></div>';
      card.addEventListener('click', () => { if (!editMode) openViewer(i); });
      grid.appendChild(card);
    });
  }

  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.innerHTML = '<div class="plus">＋</div><div class="add-label">Ajouter</div>';
  addCard.onclick = openModal;
  grid.appendChild(addCard);
}

function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('edit-toggle').textContent = editMode ? 'Terminer' : 'Modifier';
}

function deleteApp(e, i) {
  e.stopPropagation();
  if (confirm('Supprimer "' + apps[i].name + '" ?')) {
    apps.splice(i, 1);
    save();
    render();
  }
}

function renderEmojiPicker() {
  const picker = document.getElementById('emoji-picker');
  picker.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('div');
    btn.className = 'emoji-opt' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => { selectedEmoji = e; renderEmojiPicker(); };
    picker.appendChild(btn);
  });
}

function updateTypeIndicator() {
  const code = document.getElementById('inp-code').value.trim();
  const indicator = document.getElementById('type-indicator');
  if (!code) {
    indicator.style.display = 'none';
    return;
  }
  const type = detectType(code);
  indicator.style.display = 'inline-block';
  indicator.textContent = type === 'jsx' ? 'JSX détecté' : 'HTML détecté';
  indicator.className = 'detected-type ' + type;
}

function openModal() {
  if (editMode) toggleEdit();
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-code').value = '';
  document.getElementById('type-indicator').style.display = 'none';
  selectedEmoji = EMOJIS[0];
  renderEmojiPicker();
  document.getElementById('add-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function saveApp() {
  const name = document.getElementById('inp-name').value.trim();
  const code = document.getElementById('inp-code').value.trim();
  if (!name) { alert('Donne un nom.'); return; }
  if (!code) { alert('Colle le code.'); return; }
  const type = detectType(code);
  apps.push({ name, icon: selectedEmoji, code, type, date: Date.now() });
  save();
  closeModal();
  render();
}

// Compose le HTML JSX en utilisant le template caché dans la page
function buildJsxHtml(jsxCode) {
  // Nettoie les imports
  let cleanCode = jsxCode
    .replace(/^\s*import\s+.*?from\s+['"][^'"]+['"];?\s*$/gm, '')
    .replace(/^\s*import\s+['"][^'"]+['"];?\s*$/gm, '');

  // Détecte le nom du composant exporté par défaut
  let componentName = 'App';
  const m = cleanCode.match(/export\s+default\s+(?:function\s+)?(\w+)/);
  if (m) componentName = m[1];

  cleanCode = cleanCode
    .replace(/export\s+default\s+function\s+(\w+)/g, 'function $1')
    .replace(/export\s+default\s+/g, 'const __DEFAULT__ = ')
    .replace(/export\s+(const|let|var|function|class)\s+/g, '$1 ');

  const renderTarget = cleanCode.indexOf('__DEFAULT__') >= 0 ? '__DEFAULT__' : componentName;

  // Récupère le template HTML qui est dans le DOM (pas dans une chaîne JS)
  const tpl = document.getElementById('jsx-wrapper-template');
  let html = tpl.innerHTML;
  html = html.replace('/*__USER_CODE__*/', cleanCode);
  html = html.replace('/*__RENDER_TARGET__*/', renderTarget);
  return html;
}

function openViewer(i) {
  const app = apps[i];
  let codeToRender;
  if ((app.type || 'html') === 'jsx') {
    codeToRender = buildJsxHtml(app.code);
  } else {
    codeToRender = injectSafeArea(app.code);
  }
  document.getElementById('viewer-frame').srcdoc = codeToRender;
  document.getElementById('viewer').classList.add('open');
}

// Mesure les safe-area du launcher et les injecte dans le HTML de l'app embarquée
function injectSafeArea(htmlCode) {
  // Mesure les insets actuels
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;top:env(safe-area-inset-top,0);left:0;visibility:hidden;';
  document.body.appendChild(probe);
  const topInset = parseInt(getComputedStyle(probe).top) || 0;
  probe.style.top = 'env(safe-area-inset-bottom, 0)';
  const bottomInset = parseInt(getComputedStyle(probe).top) || 0;
  probe.remove();

  // Injecte un style en fin de head qui ajoute le padding nécessaire
  const styleTag = '<style id="__launcher_safe_area__">html,body{padding-top:' + topInset + 'px !important;padding-bottom:' + bottomInset + 'px !important;box-sizing:border-box;}body{min-height:100vh;}</style>';

// Trouve où injecter
if (/</head>/i.test(htmlCode)) {
return htmlCode.replace(/</head>/i, styleTag + ‘</head>’);
} else if (/<head[^>]*>/i.test(htmlCode)) {
return htmlCode.replace(/(<head[^>]*>)/i, ‘$1’ + styleTag);
} else if (/<body[^>]*>/i.test(htmlCode)) {
return htmlCode.replace(/(<body[^>]*>)/i, ‘$1’ + styleTag);
} else {
return styleTag + htmlCode;
}
}

function closeViewer() {
document.getElementById(‘viewer’).classList.remove(‘open’);
document.getElementById(‘viewer-frame’).srcdoc = ‘’;
}

function escHtml(s) {
return String(s).replace(/[&<>"’]/g, c => ({’&’:’&’,’<’:’<’,’>’:’>’,’"’:’"’,"’":’'’}[c]));
}
function formatDate(ts) {
const d = new Date(ts);
return d.toLocaleDateString(‘fr-FR’, { day: ‘numeric’, month: ‘short’ });
}

render();

if (‘serviceWorker’ in navigator) {

navigator.serviceWorker.register(‘sw.js’).catch(() => {});
});
