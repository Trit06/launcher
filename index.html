<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'flo_launcher_apps_v1';
  var EMOJIS = [
    '🎯', '🎮', '🎲', '🎨', '🎵', '⚡', '🔥', '💎',

  // ---------- ERROR HANDLING ----------
  window.onerror = function (msg, src, line, col, err) {
    showError('JS Error: ' + msg + ' @ ' + (src || '?') + ':' + line + ':' + col);
    return false;
  };
  window.addEventListener('unhandledrejection', function (e) {
    showError('Promise: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });

  function showError(text) {
    try {
      var existing = document.getElementById('errBox');
      if (!existing) {
        existing = document.createElement('div');
        existing.id = 'errBox';
        existing.className = 'err-box';
        existing.innerHTML = '<strong>Erreur</strong><div id="errContent"></div>';
        document.body.appendChild(existing);
        existing.addEventListener('click', function () {
          existing.parentNode.removeChild(existing);
        });
      }
      var content = document.getElementById('errContent');
      var line = document.createElement('div');
      line.textContent = String(text);
      content.appendChild(line);
    } catch (e) { /* swallow */ }
  }

  // ---------- HELPERS ----------
  function escHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatDate(d) {
    if (!d) return '';
    var dt = new Date(d);
    if (isNaN(dt.getTime())) return '';
    var dd = dt.getDate();
    var mm = dt.getMonth() + 1;
    var yy = String(dt.getFullYear()).slice(-2);
    if (dd < 10) dd = '0' + dd;
    if (mm < 10) mm = '0' + mm;
    return dd + '/' + mm + '/' + yy;
  }

  function loadApps() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var parsed = JSON.parse(raw);
      if (!parsed || Object.prototype.toString.call(parsed) !== '[object Array]') return [];
      return parsed;
    } catch (e) {
      showError('loadApps: ' + e.message);
      return [];
    }
  }

  function saveApps(apps) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
    } catch (e) {
      showError('saveApps: ' + e.message);
    }
  }

  // ---------- SAFE AREA MEASUREMENT ----------
  function measureSafeArea() {
    var top = 0, bot = 0;
    try {
      var sTop = document.getElementById('sondeTop');
      var sBot = document.getElementById('sondeBottom');
      if (sTop) top = sTop.getBoundingClientRect().height || 0;
      if (sBot) bot = sBot.getBoundingClientRect().height || 0;
    } catch (e) { /* ignore */ }
    return { top: Math.round(top), bottom: Math.round(bot) };
  }

          'padding-bottom: ' + sa.bottom + 'px !important; ' +
          'box-sizing: border-box; ' +
        '}' +
      '</style>';
